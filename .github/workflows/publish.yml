# Build → push → keyless-sign → set-public, with NATIVE multi-arch builds.
#
# D3 "make it a bot" builder. Manually dispatched with a tool list (the D2 ranking
# driver that auto-generates the list is a later addition).
#
# Architecture (D9): each tool is classified by a cheap solve, then routed:
#   - noarch (Python/Java)  -> multi-arch manifest. amd64 is built on a NATIVE
#     amd64 runner and arm64 on a NATIVE arm64 runner (NO QEMU — emulating the
#     other arch made metaphlan take ~25min), then merged into one manifest.
#   - arch-specific (C/C++) -> arm64-only on a native arm64 runner (amd64 already
#     exists upstream at quay.io/biocontainers).
# Both paths then cosign KEYLESS-sign (D6, Sigstore/Rekor) and set the repo
# public via the quay API (D6a). Failures auto-file arm64-gap issues (D10).

name: publish

on:
  workflow_dispatch:
    inputs:
      tools:
        description: 'Space-separated "pkg=version" pairs, e.g. "minimap2=2.28 bwa=0.7.18"'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # cosign keyless (OIDC)
  issues: write     # auto-file arm64-gap issues

env:
  REGISTRY: quay.io/aarchbio

jobs:
  # ---------------------------------------------------------------------------
  # 1. Classify each tool (cheap dry-run solve) -> two routing lists + a flat
  #    "build leg" list for the multi-arch matrix (one entry per tool×platform).
  # ---------------------------------------------------------------------------
  classify:
    runs-on: ubuntu-24.04-arm
    outputs:
      arm64_only: ${{ steps.c.outputs.arm64_only }}   # JSON array of {tool,version,tag}
      multiarch:  ${{ steps.c.outputs.multiarch }}     # JSON array of {tool,version,tag}
      legs:       ${{ steps.c.outputs.legs }}          # JSON array of {tool,version,tag,platform,runner}
      gaps:       ${{ steps.c.outputs.gaps }}          # JSON array of {tool,version}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: c
        run: |
          set -uo pipefail
          arm=(); multi=(); legs=(); gaps=()
          # Each token is "pkg=version" or a MULLED spec "pkg=version+extra=ver+...".
          # The primary pkg=version drives classify/tag; '+'-joined extras become
          # EXTRA_PACKAGES (space-separated) for a mulled image (e.g. Wave's
          # kraken2_coreutils_pigz). Extras are carried in the matrix JSON as "extra".
          for token in ${{ inputs.tools }}; do
            primary="${token%%+*}"                 # pkg=version
            pkg="${primary%%=*}"; ver="${primary#*=}"
            extra=""
            if [ "$token" != "$primary" ]; then    # had '+' -> extras present
              extra="$(echo "${token#*+}" | tr '+' ' ')"   # "coreutils=9.4 pigz=2.8"
            fi
            out="$(mktemp)"
            if ! GITHUB_OUTPUT="$out" ./builder/classify.sh "$pkg" "$ver"; then
              gaps+=("{\"tool\":\"$pkg\",\"version\":\"$ver\"}"); continue
            fi
            tag="$(grep '^tag=' "$out" | cut -d= -f2-)"
            noarch="$(grep '^noarch=' "$out" | cut -d= -f2-)"
            obj="{\"tool\":\"$pkg\",\"version\":\"$ver\",\"tag\":\"$tag\",\"extra\":\"$extra\"}"
            if [ "$noarch" = "1" ]; then
              multi+=("$obj")
              legs+=("{\"tool\":\"$pkg\",\"version\":\"$ver\",\"tag\":\"$tag\",\"extra\":\"$extra\",\"platform\":\"linux/amd64\",\"runner\":\"ubuntu-24.04\"}")
              legs+=("{\"tool\":\"$pkg\",\"version\":\"$ver\",\"tag\":\"$tag\",\"extra\":\"$extra\",\"platform\":\"linux/arm64\",\"runner\":\"ubuntu-24.04-arm\"}")
            else
              arm+=("$obj")
            fi
          done
          join() { local IFS=,; echo "[$*]"; }
          echo "arm64_only=$(join "${arm[@]}")"  >> "$GITHUB_OUTPUT"
          echo "multiarch=$(join "${multi[@]}")" >> "$GITHUB_OUTPUT"
          echo "legs=$(join "${legs[@]}")"       >> "$GITHUB_OUTPUT"
          echo "gaps=$(join "${gaps[@]}")"       >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. arch-specific tools: single native arm64 build → push (tagged) → sign →
  #    public. Uses the all-in-one build.sh.
  # ---------------------------------------------------------------------------
  arm64-only:
    needs: classify
    if: ${{ needs.classify.outputs.arm64_only != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJSON(needs.classify.outputs.arm64_only) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - name: Login
        run: echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin
      - name: Build, sign, publish (arm64-only)
        env:
          PUSH: '1'
          COSIGN_YES: 'true'
          QUAY_OAUTH_TOKEN: ${{ secrets.QUAY_OAUTH_TOKEN }}
          EXTRA_PACKAGES: ${{ matrix.tool.extra }}
        run: |
          set -uo pipefail
          out="$(mktemp)"
          GITHUB_OUTPUT="$out" ./builder/build.sh "${{ matrix.tool.tool }}" "${{ matrix.tool.version }}"
          pinned="$(grep '^pinned=' "$out" | cut -d= -f2-)"
          [ -n "$pinned" ] || { echo "no digest"; exit 1; }
          cosign sign --yes "$pinned"
          curl -s -X POST -H "Authorization: Bearer $QUAY_OAUTH_TOKEN" -H 'Content-Type: application/json' \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/aarchbio/${{ matrix.tool.tool }}/changevisibility"

  # ---------------------------------------------------------------------------
  # 3a. noarch build legs: one job per (tool × arch), each on its NATIVE runner.
  #     Builds that arch, pushes by digest, saves the digest as an artifact.
  # ---------------------------------------------------------------------------
  build-leg:
    needs: classify
    if: ${{ needs.classify.outputs.legs != '[]' }}
    runs-on: ${{ matrix.leg.runner }}
    strategy:
      fail-fast: false
      matrix:
        leg: ${{ fromJSON(needs.classify.outputs.legs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login
        run: echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin
      - name: Build one arch natively, push by digest
        env:
          PLATFORM: ${{ matrix.leg.platform }}
          EXTRA_PACKAGES: ${{ matrix.leg.extra }}
        run: |
          set -uo pipefail
          out="$(mktemp)"
          GITHUB_OUTPUT="$out" ./builder/build-arch.sh "${{ matrix.leg.tool }}" "${{ matrix.leg.version }}"
          digest="$(grep '^arch_digest=' "$out" | cut -d= -f2-)"
          [ -n "$digest" ] || { echo "no digest"; exit 1; }
          # Save digest under a name keyed by tool + sanitized platform.
          safe="$(echo "${{ matrix.leg.platform }}" | tr '/' '-')"
          mkdir -p digests
          echo "$digest" > "digests/${{ matrix.leg.tool }}__${safe}.digest"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.leg.tool }}-${{ strategy.job-index }}
          path: digests/*.digest
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3b. merge noarch legs into a multi-arch manifest → sign → public.
  # ---------------------------------------------------------------------------
  merge:
    needs: [classify, build-leg]
    if: ${{ needs.classify.outputs.multiarch != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJSON(needs.classify.outputs.multiarch) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - name: Login
        run: echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin
      - uses: actions/download-artifact@v4
        with:
          path: all-digests
          pattern: digest-${{ matrix.tool.tool }}-*
          merge-multiple: true
      - name: Merge manifest, sign, publish
        env:
          COSIGN_YES: 'true'
          QUAY_OAUTH_TOKEN: ${{ secrets.QUAY_OAUTH_TOKEN }}
        run: |
          set -uo pipefail
          digests=( $(cat all-digests/${{ matrix.tool.tool }}__*.digest) )
          [ "${#digests[@]}" -ge 2 ] || { echo "expected 2 arch digests, got ${#digests[@]}"; exit 1; }
          out="$(mktemp)"
          GITHUB_OUTPUT="$out" ./builder/merge.sh "${{ matrix.tool.tool }}" "${{ matrix.tool.tag }}" "${digests[@]}"
          pinned="$(grep '^pinned=' "$out" | cut -d= -f2-)"
          [ -n "$pinned" ] || { echo "no manifest digest"; exit 1; }
          cosign sign --yes "$pinned"
          curl -s -X POST -H "Authorization: Bearer $QUAY_OAUTH_TOKEN" -H 'Content-Type: application/json' \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/aarchbio/${{ matrix.tool.tool }}/changevisibility"

  # ---------------------------------------------------------------------------
  # 4. File arm64-gap issues for tools that failed to classify (no arm64 solution).
  # ---------------------------------------------------------------------------
  gaps:
    needs: classify
    if: ${{ needs.classify.outputs.gaps != '[]' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: File arm64-gap issues
        env:
          GH_TOKEN: ${{ github.token }}
          GAPS: ${{ needs.classify.outputs.gaps }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          echo "$GAPS" | jq -c '.[]' | while read -r g; do
            pkg="$(echo "$g" | jq -r .tool)"; ver="$(echo "$g" | jq -r .version)"
            title="arm64-gap: ${pkg}=${ver}"
            if gh issue list --repo "$GITHUB_REPOSITORY" --state open --label arm64-gap \
                 --search "in:title $title" --json title --jq '.[].title' | grep -qxF "$title"; then
              echo "already open: $title"; continue
            fi
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --label arm64-gap \
              --body "Automated: \`${pkg}=${ver}\` has no resolvable linux-aarch64 bioconda solution (the 'hard 15%'). Fix likely belongs upstream in the bioconda recipe (enable linux-aarch64 CI). Run: ${RUN_URL}"
          done
