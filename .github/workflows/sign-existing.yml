# Sign + publish images that already exist in the registry (e.g. pushed by the
# local build farm, which has no OIDC so can't keyless-sign). Closes the D6 loop:
# farm builds heavy+local (private/unsigned) -> this signs light+in-CI (truthful
# Sigstore/Rekor provenance) -> sets public.
#
# Input: space-separated "tool:tag" pairs, e.g. "bedtools:2.31.1--h63bafd0_3 ..."
# (the farm's state.tsv 'ok' lines give exactly these refs).

name: sign-existing

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Space-separated tool:tag pairs (e.g. "bedtools:2.31.1--h63bafd0_3 cnvkit:0.9.11--pyhdfd78af_0")'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # cosign keyless (OIDC)

jobs:
  sign:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Login (robot — needed to resolve private repos)
        run: echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin
      - name: Sign + publish each image
        env:
          COSIGN_YES: 'true'
          QUAY_OAUTH_TOKEN: ${{ secrets.QUAY_OAUTH_TOKEN }}
        run: |
          set -uo pipefail
          fail=0
          for ref in ${{ inputs.images }}; do
            tool="${ref%%:*}"; tag="${ref#*:}"
            echo "::group::$ref"
            image="quay.io/aarchbio/$tool:$tag"

            # Resolve the (manifest) digest cosign should sign — signing by digest
            # is correct; for a multi-arch tag this is the manifest-list digest.
            digest="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}' 2>/dev/null)"
            if [ -z "$digest" ]; then echo "  cannot resolve digest for $image"; fail=1; echo '::endgroup::'; continue; fi
            pinned="quay.io/aarchbio/$tool@$digest"

            echo "  signing $pinned"
            if ! cosign sign --yes "$pinned"; then echo "  sign FAILED"; fail=1; echo '::endgroup::'; continue; fi

            echo "  setting $tool public"
            code="$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              -H "Authorization: Bearer $QUAY_OAUTH_TOKEN" -H 'Content-Type: application/json' \
              -d '{"visibility":"public"}' \
              "https://quay.io/api/v1/repository/aarchbio/$tool/changevisibility")"
            [ "$code" = "200" ] && echo "  public ✓" || { echo "  changevisibility HTTP $code"; fail=1; }
            echo '::endgroup::'
          done
          exit $fail
